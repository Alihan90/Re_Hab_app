name: Flutter Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Завантажуємо код вашого репозиторію
    - uses: actions/checkout@v4

    # 2. Налаштовуємо Java (необхідно для Android Gradle)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. Встановлюємо Flutter
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 4. Створюємо Android-структуру та ЗАПИСУЄМО ЧИСТИЙ НАДІЙНИЙ МАНІФЕСТ
    - name: Reconstruct Android platform folders and write Manifest
      run: |
        flutter create . --platforms=android
        cat << 'EOF' > android/app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:label="re_hab_app"
                android:name="${applicationName}"
                android:icon="@mipmap/ic_launcher"
                android:usesCleartextTraffic="true">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    <meta-data
                      android:name="io.flutter.embedding.android.NormalTheme"
                      android:resource="@style/NormalTheme"
                      />
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                <meta-data
                    android:name="flutterEmbedding"
                    android:value="2" />
            </application>
        </manifest>
        EOF

    # 5. Завантаження залежностей
    - name: Install dependencies
      run: flutter pub get

    # 6. Автоматична генерація коду для бази даних Drift
    - name: Run Drift code generation
      run: dart run build_runner build --delete-conflicting-outputs

    # 7. Запуск тесту
    - name: Run Unit Tests
      run: flutter test test/irp_engine_test.dart

    # 8. Фінальна збірка додатка в APK-файл
    - name: Build APK Release
      run: flutter build apk --release --target-platform android-arm64

    # 9. Зберігаємо готовий APK файл для завантаження
    - name: Upload Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: rehabilitation-app-release
        path: build/app/outputs/flutter-apk/app-release.apk
