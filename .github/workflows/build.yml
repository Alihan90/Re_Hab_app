name: Flutter Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Завантажуємо код вашого репозиторію
    - uses: actions/checkout@v4

    # 2. Налаштовуємо Java (необхідно для Android Gradle)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. Встановлюємо Flutter
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 4. Створюємо Android-структуру та автоматично вшиваємо дозволи на інтернет
    - name: Reconstruct Android platform folders and inject permissions
      run: |
        flutter create . --platforms=android
        # Вставляємо дозвіл на інтернет перед тегом <application>
        sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
        # Дозволяємо HTTP-трафік (Cleartext), якщо база даних працює без https://
        sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

    # 5. Завантаження залежностей
    - name: Install dependencies
      run: flutter pub get

    # 6. Автоматична генерація коду для бази даних Drift
    - name: Run Drift code generation
      run: dart run build_runner build --delete-conflicting-outputs

    # 7. Запуск тесту
    - name: Run Unit Tests
      run: flutter test test/irp_engine_test.dart

    # 8. Фінальна збірка додатка в APK-файл
    - name: Build APK Release
      run: flutter build apk --release --target-platform android-arm64

    # 9. Зберігаємо готовий APK файл для завантаження
    - name: Upload Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: rehabilitation-app-release
        path: build/app/outputs/flutter-apk/app-release.apk
